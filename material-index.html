<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MatTrack</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet"/>
<style>
  :root{--bg:#0d0f14;--surface:#13161e;--surface2:#1a1e29;--border:#2a2f3f;--accent:#c084fc;--accent2:#ff6b35;--accent3:#00ff9d;--text:#d0d8f0;--muted:#5a6180;--fh:'Rajdhani',sans-serif;--fm:'Share Tech Mono',monospace;--fb:'Exo 2',sans-serif;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:var(--fb);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;background-image:radial-gradient(ellipse at 20% 0%,rgba(192,132,252,.07) 0%,transparent 60%),radial-gradient(ellipse at 80% 100%,rgba(0,255,157,.04) 0%,transparent 60%);}
  .container{width:100%;max-width:480px;}
  .logo{font-family:var(--fh);font-size:2.5rem;font-weight:700;letter-spacing:4px;color:var(--accent);text-transform:uppercase;text-align:center;margin-bottom:.25rem;}
  .logo span{color:var(--muted);font-weight:400;}
  .sub{font-family:var(--fm);font-size:.72rem;letter-spacing:2px;color:var(--muted);text-align:center;margin-bottom:.5rem;text-transform:uppercase;}
  .tagline{font-family:var(--fb);font-size:.85rem;color:var(--muted);text-align:center;margin-bottom:3rem;font-style:italic;}
  .cards{display:flex;flex-direction:column;gap:1rem;}
  .portal{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1.5rem 2rem;text-decoration:none;color:var(--text);transition:all .2s;display:flex;align-items:center;gap:1.2rem;}
  .portal:hover{border-color:var(--portal-color);transform:translateY(-2px);box-shadow:0 4px 20px rgba(0,0,0,.3);}
  .portal-icon{font-size:1.8rem;flex-shrink:0;}
  .portal-name{font-family:var(--fh);font-size:1.2rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--portal-color);margin-bottom:.2rem;}
  .portal-desc{font-family:var(--fm);font-size:.72rem;color:var(--muted);letter-spacing:.5px;}
  .entry{--portal-color:var(--accent);}
  .viewer{--portal-color:var(--accent3);}
  .master{--portal-color:var(--accent2);}
  .footer{font-family:var(--fm);font-size:.68rem;color:var(--muted);text-align:center;margin-top:2.5rem;letter-spacing:1px;}
</style>
</head>
<body>
<div class="container">
  <div class="logo">Mat<span>Track</span></div>
  <div class="sub">Materials Monitoring System</div>
  <div class="tagline">Track. Monitor. Control.</div>
  <div class="cards">
    <a href="material-entry.html" class="portal entry">
      <div class="portal-icon">📦</div>
      <div>
        <div class="portal-name">Entry Portal</div>
        <div class="portal-desc">Log inventory, deliveries and pull outs</div>
      </div>
    </a>
    <a href="material-viewer.html" class="portal viewer">
      <div class="portal-icon">📊</div>
      <div>
        <div class="portal-name">Viewer Portal</div>
        <div class="portal-desc">View records, summary and export data</div>
      </div>
    </a>
    <a href="material-master.html" class="portal master">
      <div class="portal-icon">⚙️</div>
      <div>
        <div class="portal-name">Master Portal</div>
        <div class="portal-desc">Admin only — edit and delete records</div>
      </div>
    </a>
  </div>
  <div class="footer">ARDZ Construction · MatTrack v1.0</div>
</div>
</body>
</html>
